name: unittest.yml
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.1.0
        with:
          python-version: 3.13

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon-x11-0 libxcb-xinerama0 libxcb-xfixes0
          python -m pip install --upgrade pip
          pip install -r requirements_dev.txt

      - name: Run pytest
        run: pytest
